name: test

on:
  push:
    branches:
      - main
    paths:
      - 'Ash2/src/**'
      - 'Ash2/tests/**'
      - '.github/workflows/ci-test.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'Ash2/src/**'
      - 'Ash2/tests/**'
      - '.github/workflows/ci-test.yml'

env:
  SIV3D_VERSION: 0.6.16

jobs:
  test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download Siv3D SDK
        shell: pwsh
        run: |
          bitsadmin /transfer s3d-download "https://siv3d.jp/downloads/Siv3D/manual/${{ env.SIV3D_VERSION }}/OpenSiv3D_SDK_${{ env.SIV3D_VERSION }}.zip" "C:\OpenSiv3D_SDK.zip"
          Expand-Archive -Path "C:\OpenSiv3D_SDK.zip" -DestinationPath "C:"

      - name: Set up MSVC
        uses: ilammy/msvc-dev-cmd@v1

      - name: Build tests
        shell: pwsh
        run: |
          $sdkRoot    = "C:\OpenSiv3D_SDK_${{ env.SIV3D_VERSION }}"
          $projectDir = "$env:GITHUB_WORKSPACE\Ash2"
          $outDir     = "$projectDir\tests\standalone"

          $env:LIB = "$sdkRoot\lib\Windows;$env:LIB"

          $testFiles = Get-ChildItem -Path "$projectDir\tests" -Filter "*.cpp" |
            Select-Object -ExpandProperty FullName

          $srcFiles = @(
            "$projectDir\src\Phase\WaitPhase.cpp"
          )

          cl.exe `
            /std:c++latest /Zc:__cplusplus /utf-8 /EHsc `
            /DUSE_TEST `
            /I"$projectDir\src" `
            /I"$projectDir" `
            /I"$sdkRoot\include" `
            /I"$sdkRoot\include\ThirdParty" `
            "$outDir\main.cpp" `
            $testFiles `
            $srcFiles `
            /Fe:"$outDir\tests.exe"

          if ($LASTEXITCODE -ne 0) { exit 1 }

      - name: Run tests
        shell: pwsh
        run: |
          & "$env:GITHUB_WORKSPACE\Ash2\tests\standalone\tests.exe"
          exit $LASTEXITCODE
