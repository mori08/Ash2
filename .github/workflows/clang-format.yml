name: clang-format check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  format-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install clang-format
        run: sudo apt-get install -y clang-format-18

      - name: Run clang-format
        run: |
          clang-format-18 --dry-run \
            $(find Ash2/src Ash2/tests -name "*.cpp" -o -name "*.hpp")

      - name: Check diff
        run: |
          clang-format-18 --dry-run --Werror \
            $(find Ash2/src Ash2/tests -name "*.cpp" -o -name "*.hpp") \
            && echo "Format OK" \
            || echo "Format issues found (not blocking yet)"
