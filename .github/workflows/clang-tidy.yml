name: clang-tidy

on:
  push:
    paths:
      - 'Ash2/src/**'
      - 'Ash2/tests/**'
      - '.clang-tidy'
  pull_request:
    paths:
      - 'Ash2/src/**'
      - 'Ash2/tests/**'
      - '.clang-tidy'

env:
  SIV3D_VERSION: 0.6.15

jobs:
  clang-tidy:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download Siv3D SDK
        run: |
          bitsadmin /transfer s3d-download "https://siv3d.jp/downloads/Siv3D/manual/${{ env.SIV3D_VERSION }}/OpenSiv3D_SDK_${{ env.SIV3D_VERSION }}.zip" "C:\OpenSiv3D_SDK.zip"
          Expand-Archive -Path "C:\OpenSiv3D_SDK.zip" -DestinationPath "C:"
        shell: powershell

      - name: Run clang-tidy
        run: |
          $sdk = "C:\OpenSiv3D_SDK_${{ env.SIV3D_VERSION }}"
          $files = Get-ChildItem -Recurse -Include "*.cpp" -Path "Ash2\src", "Ash2\tests" |
                   Where-Object { $_.Name -ne "stdafx.cpp" } |
                   ForEach-Object { $_.FullName }
          $failed = $false
          foreach ($file in $files) {
            Write-Output "Checking: $file"
            clang-tidy $file `
              --extra-arg="-std=c++23" `
              --extra-arg="-I$sdk\include" `
              --extra-arg="-I$sdk\include\ThirdParty" `
              --extra-arg="-w"
            if ($LASTEXITCODE -ne 0) { $failed = $true }
          }
          if ($failed) { exit 1 }
        shell: powershell
