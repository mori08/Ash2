name: clang-tidy

on:
  push:
    paths:
      - 'Ash2/src/**'
      - 'Ash2/tests/**'
      - '.clang-tidy'
      - '.github/workflows/clang-tidy.yml'
  pull_request:
    paths:
      - 'Ash2/src/**'
      - 'Ash2/tests/**'
      - '.clang-tidy'
      - '.github/workflows/clang-tidy.yml'

env:
  SIV3D_VERSION: 0.6.15

jobs:
  clang-tidy:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download Siv3D SDK
        run: |
          bitsadmin /transfer s3d-download "https://siv3d.jp/downloads/Siv3D/manual/${{ env.SIV3D_VERSION }}/OpenSiv3D_SDK_${{ env.SIV3D_VERSION }}.zip" "C:\OpenSiv3D_SDK.zip"
          Expand-Archive -Path "C:\OpenSiv3D_SDK.zip" -DestinationPath "C:"
        shell: powershell

      - name: Find MSVC and Windows SDK paths
        id: msvc
        run: |
          $vswhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
          $vsPath = & $vswhere -latest -property installationPath
          $msvcDir = Get-ChildItem "$vsPath\VC\Tools\MSVC" | Sort-Object Name -Descending | Select-Object -First 1
          $msvcInclude = "$($msvcDir.FullName)\include"
          $winSdkBase = "${env:ProgramFiles(x86)}\Windows Kits\10\Include"
          $winSdkVer = (Get-ChildItem $winSdkBase | Sort-Object Name -Descending | Select-Object -First 1).Name
          echo "msvc_include=$msvcInclude" >> $env:GITHUB_OUTPUT
          echo "winsdk_base=$winSdkBase" >> $env:GITHUB_OUTPUT
          echo "winsdk_ver=$winSdkVer" >> $env:GITHUB_OUTPUT
        shell: powershell

      - name: Run clang-tidy
        run: |
          $sdk     = "C:\OpenSiv3D_SDK_${{ env.SIV3D_VERSION }}"
          $msvc    = "${{ steps.msvc.outputs.msvc_include }}"
          $sdkBase = "${{ steps.msvc.outputs.winsdk_base }}"
          $sdkVer  = "${{ steps.msvc.outputs.winsdk_ver }}"

          $files = Get-ChildItem -Recurse -Include "*.cpp" -Path "Ash2\src", "Ash2\tests" |
                   Where-Object { $_.Name -ne "stdafx.cpp" } |
                   ForEach-Object { $_.FullName }
          $failed = $false
          foreach ($file in $files) {
            Write-Output "Checking: $file"
            clang-tidy $file `
              --extra-arg="--driver-mode=cl" `
              --extra-arg="/std:c++latest" `
              --extra-arg="/EHsc" `
              --extra-arg="/I$sdk\include" `
              --extra-arg="/I$sdk\include\ThirdParty" `
              --extra-arg="/I$msvc" `
              --extra-arg="/I$sdkBase\$sdkVer\ucrt" `
              --extra-arg="/I$sdkBase\$sdkVer\um" `
              --extra-arg="/I$sdkBase\$sdkVer\shared" `
              --extra-arg="/w"
            if ($LASTEXITCODE -ne 0) { $failed = $true }
          }
          if ($failed) { exit 1 }
        shell: powershell
